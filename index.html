<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/library.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="left">
            <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><title>BookStack</title><path d="M.3013 17.6146c-.1299-.3387-.5228-1.5119-.1337-2.4314l9.8273 5.6738a.329.329 0 0 0 .3299 0L24 12.9616v2.3542l-13.8401 7.9906-9.8586-5.6918zM.1911 8.9628c-.2882.8769.0149 2.0581.1236 2.4261l9.8452 5.6841L24 9.0823V6.7275L10.3248 14.623a.329.329 0 0 1-.3299 0L.1911 8.9628zm13.1698-1.9361c-.1819.1113-.4394.0015-.4852-.2064l-.2805-1.1336-2.1254-.1752a.33.33 0 0 1-.1378-.6145l5.5782-3.2207-1.7021-.9826L.6979 8.4935l9.462 5.463 13.5104-7.8004-4.401-2.5407-5.9084 3.4113zm-.1821-1.7286.2321.938 5.1984-3.0014-2.0395-1.1775-4.994 2.8834 1.3099.108a.3302.3302 0 0 1 .2931.2495zM24 9.845l-13.6752 7.8954a.329.329 0 0 1-.3299 0L.1678 12.0667c-.3891.919.003 2.0914.1332 2.4311l9.8589 5.692L24 12.1993V9.845z"/></svg>
            <h1>library</h1>
        </div>
        <div class="right">
            <button class="log-in">Log in</button>
        </div>
    </div>
    <div class="main">
        <div class="shelf">
            <div class="top">
                <h2>bookshelf</h2>
                <button class="add-book">Add book</button>
            </div>
            <!-- dialog modal for adding books -->
             <dialog>
                <form id="book-form">
                    <h3>add book</h3>
                    <div class="input title">
                        <label for="title">TITLE</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="input author">
                        <label for="author">AUTHOR</label>
                        <input type="text" id="author" required>
                    </div>
                    <div class="input page">
                        <label for="pc">TOTAL PAGES</label>
                        <input type="number" id="pc" required>
                    </div>
                    <dic class="input read">
                        <label for="read">Have you read the book?</label>
                        <input type="checkbox" id="read">
                    </dic>
                    <div class="buttons">
                        <button type="button" class="cancel">Cancel</button>
                        <button type="submit" class="add-to-lib">add to the library</button>
                    </div>
                </form>
            </dialog>

            <div class="middle">
                <div class="col-head">
                    <div class="title">
                        <h3>Book title</h3>
                        <hr>
                    </div>
                    <div class="author">
                        <h3 class="author">Author</h3>
                        <hr>
                    </div>
                    <div class="pc">
                        <h3 class="pc">Total pages</h3>
                        <hr>
                    </div>
                    <div class="rs">
                        <h3 class="rs">Read status</h3>
                        <hr>
                    </div>
                </div>
                <!-- all books are placed here... -->
                 
            </div>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 – library, lnc. All rights reserved</p>
        <a href="https://github.com/soikat27/book-library-web">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
            </svg>
        </a>
    </div>
</body>
</html>
